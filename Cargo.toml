[package]
name = "spellwheel"
version = "0.1.0"
edition = "2024"

[lib]
crate-type = ["cdylib"]

[dependencies]
eldenring = "0.13.0"
fromsoftware-shared = "0.13.0"

windows = { version = "0.62.2", features = [
    "Win32_Foundation",
    "Win32_Graphics_Dxgi",
    "Win32_Graphics_Dxgi_Common",
    "Win32_Graphics_Direct3D12",
    "Win32_System_LibraryLoader",
    "Win32_UI_WindowsAndMessaging"
] }
imgui = "0.12.0"

detour = "0.8"

windows-sys = "0.61.2"
tracing = "0.1.44"
tracing-subscriber = "0.3.23"
pmod = { git = "https://github.com/Dasaav-dsv/pmod" }
