# The key used to open the spell wheel. This uses the Windows Virtual Key Codes, so the names may not be what you expect.
# You can visit this website for the full list of VK codes:
# https://learn.microsoft.com/en-us/windows/win32/inputdev/virtual-key-codes
# Note that you should not prefix the key with "VK_". So if you want Tab, write "TAB". If you want Alt, write "MENU".
key = "TAB"

# Decides whether to use controller or mouse and keyboard. true for controller, false for mouse & keyboard. Default is false.
using_controller = false

# How is many seconds needed to press DPad Up in order to open the spell wheel on controller. Default is 0.5.
controller_wheel_open_delay = 0.5

# How to display the names of the spells. "show" to show them on each spell, "center" to show the selected spell,
# and "hide" to hide them completely. Default is "show"
spell_names = "show"

# Whether text shadows are enabled. Default is true.
text_shadows = true

# The amount to scale the spell name font size. Default is 1.
font_scale_multiplier = 1.0

# The amount to scale the spell icon size. Default is 0.15.
icon_scale_multiplier = 0.15

# The amount to scale the spell wheel radius. Default is 0.3.
radius_multiplier = 0.3

# The minimum distance to move the mouse to select spells.
# This is a fraction of the radius, so with 0.5 you have to move your mouse 50% of the radius in order to select a spell.
# Default is 0.3.
min_radius = 0.3

# Paths to JSON files for modded spells. Empty by default. The path is relative to Game/mods/spellwheel/icons, so for example,
# if you want to reference a JSON file that's in ELDEN RING/Game/mods/spellwheel/icons/MyModdedSpells.json, you'd write ["MyModdedSpells.json"],
# or if you want to reference a JSON file that's in ELDEN RING/Game/custom spells/MyModdedSpells.json, you'd write ["../../../custom spells/MyModdedSpells.json"]
# If you want multiple modded spell files, you can have that too: ["ModdedSpells1.json", "ModdedSpells2.json"]
# For mod creators who want to write such JSON files, read the documentation in the GitHub repo for more info: https://github.com/notahackusator/SpellWheel
modded_spells = []

# Waits before hooking into controller inputs.
await_xinput_hook = false